<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Premium Indigo for the Document -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338CA" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    
    <!-- Rich Gold for the Exchange Arrows -->
    <linearGradient id="goldGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    
    <linearGradient id="goldGrad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>

    <!-- Drop Shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Central Document Shape (Represents the 'Bill') -->
  <path d="M 160 80 L 310 80 L 384 154 L 384 400 C 384 418 369 432 352 432 L 160 432 C 142 432 128 418 128 400 L 128 112 C 128 94 142 80 160 80 Z" 
        fill="url(#docGrad)" filter="url(#shadow)" />
        
  <!-- Document Folded Corner -->
  <path d="M 310 80 L 310 154 L 384 154 Z" fill="#6366F1" opacity="0.9" />

  <!-- The "e" Cutout in the Document -->
  <path d="M 256 190 C 215 190 180 220 180 266 C 180 310 215 342 256 342 C 285 342 305 325 320 300 L 285 275 C 275 295 265 305 256 305 C 240 305 225 295 220 275 L 325 275 C 326 265 326 255 326 245 C 326 210 295 190 256 190 Z M 220 245 C 225 225 240 218 256 218 C 275 218 290 228 290 245 Z" 
        fill="#FFFFFF" />

  <!-- Top-Left Exchange Arrow (Represents the 'Exchange') -->
  <path d="M 50 256 C 50 142 142 50 256 50 L 256 10 L 336 80 L 256 150 L 256 110 C 175 110 110 175 110 256 Z" 
        fill="url(#goldGrad1)" filter="url(#shadow)" />
        
  <!-- Bottom-Right Exchange Arrow -->
  <path d="M 462 256 C 462 370 370 462 256 462 L 256 502 L 176 432 L 256 362 L 256 402 C 337 402 402 337 402 256 Z" 
        fill="url(#goldGrad2)" filter="url(#shadow)" />

</svg>
