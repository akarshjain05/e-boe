version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eboe_dev
      POSTGRES_USER: eboe
      POSTGRES_PASSWORD: eboe_dev_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eboe -d eboe_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eboe_network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eboe_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - eboe_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker/Dockerfile
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    env_file:
      - .env.development
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    networks:
      - eboe_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/worker/Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - .env.development
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app beat --loglevel=info
    networks:
      - eboe_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - eboe_network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - eboe_network

volumes:
  postgres_data:
  redis_data:

networks:
  eboe_network:
    driver: bridge
