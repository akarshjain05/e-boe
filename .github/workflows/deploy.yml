name: Deploy to AWS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd ~/e-boe
            git pull origin main
            
            # Force cleanup of any stuck containers from previous failed deployments
            sudo docker stop $(sudo docker ps -aq --filter "name=e-boe") 2>/dev/null || true
            sudo docker rm -f $(sudo docker ps -aq --filter "name=e-boe") 2>/dev/null || true
            sudo docker network rm e-boe_eboe_network 2>/dev/null || true
            sudo docker network prune -f
            
            sudo docker compose -f docker-compose.prod.yml down --remove-orphans
            sudo docker volume rm e-boe_frontend_dist || true
            sudo docker compose -f docker-compose.prod.yml up -d --build
            
            # Wait for backend to be ready then run database migrations
            sleep 10
            sudo docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
