version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eboe_prod_db}
      POSTGRES_USER: ${POSTGRES_USER:-eboe_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eboe_prod} -d ${POSTGRES_DB:-eboe_prod_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eboe_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_prod:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eboe_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eboe_network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker/Dockerfile
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    networks:
      - eboe_network
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/worker/Dockerfile
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app beat --loglevel=info
    networks:
      - eboe_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.prod
    volumes:
      - frontend_dist:/app/dist
    networks:
      - eboe_network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    networks:
      - eboe_network
    restart: unless-stopped

volumes:
  postgres_data_prod:
  redis_data_prod:
  frontend_dist:

networks:
  eboe_network:
    driver: bridge
